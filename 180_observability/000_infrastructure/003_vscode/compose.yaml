# https://docs.docker.com/compose/compose-file

services:

  # https://doc.traefik.io/traefik/
  traefik:
    image: traefik:v3.6.10
    command:
    - --log=true
    - --log.level=DEBUG
    - --api=true
    - --api.dashboard=true
    - --entrypoints.http.address=:80
    - --entrypoints.https.address=:443
    - --providers.file.directory=/etc/traefik/conf.d
    - --providers.docker=true
    - --providers.docker.exposedByDefault=false
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./traefik.d:/etc/traefik/conf.d:ro
    - /etc/ssl:/etc/traefik/ssl:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "netstat -tunapl | grep LISTEN | grep :80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      # Global redirection middleware
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
      # Auth
      traefik.http.middlewares.traefik-auth.basicauth.users: ${TRAEFIK_HTPASSWD?Environment variable TRAEFIK_HTPASSWD is mandatory}
      # traefik dashboard: redirection to HTTPS
      traefik.http.routers.traefik.entrypoints: http
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.rule: Host(`traefik.vscode.${DOMAIN?Environment variable DOMAIN is mandatory}`)
      traefik.http.routers.traefik.middlewares: redirect-to-https
      # traefik dashboard: authenticated endpoint
      traefik.http.routers.traefik-s.entrypoints: https
      traefik.http.routers.traefik-s.service: api@internal
      traefik.http.routers.traefik-s.rule: Host(`traefik.vscode.${DOMAIN?Environment variable DOMAIN is mandatory}`)
      traefik.http.routers.traefik-s.tls: "true"
      # TODO: Fix auth
      #traefik.http.routers.traefik-s.middlewares: seat-auth
      
  vscode:
    image: vscode
    command:
    - --auth
    - none
    - --proxy-domain
    - seat${SEAT_INDEX}.vscode.${DOMAIN?Environment variable DOMAIN is mandatory}
    - --disable-telemetry
    environment:
      GIT_USER: "${GIT_USER}"
      GIT_EMAIL: "${GIT_EMAIL}"
      GIT_CRED: "${GIT_CRED}"
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      # Auth
      traefik.http.middlewares.vscode${SEAT_INDEX}-auth.basicauth.users: ${SEAT${SEAT_INDEX}_HTPASSWD?Environment variable SEAT${SEAT_INDEX} is mandatory}
      # Service port
      traefik.http.services.vscode${SEAT_INDEX}.loadbalancer.server.port: 8080
      # Redirection to HTTPS
      traefik.http.routers.vscode${SEAT_INDEX}.entrypoints: http
      traefik.http.routers.vscode${SEAT_INDEX}.rule: Host(`seat${SEAT_INDEX}.vscode.${DOMAIN?Environment variable DOMAIN is mandatory}`)
      traefik.http.routers.vscode${SEAT_INDEX}.service: vscode${SEAT_INDEX}
      traefik.http.routers.vscode${SEAT_INDEX}.middlewares: redirect-to-https
      # Authenticated endpoint
      traefik.http.routers.vscode${SEAT_INDEX}-s.entrypoints: https
      traefik.http.routers.vscode${SEAT_INDEX}-s.rule: Host(`seat${SEAT_INDEX}.vscode.${DOMAIN?Environment variable DOMAIN is mandatory}`)
      traefik.http.routers.vscode${SEAT_INDEX}-s.service: vscode${SEAT_INDEX}
      traefik.http.routers.vscode${SEAT_INDEX}-s.middlewares: vscode${SEAT_INDEX}-auth
      traefik.http.routers.vscode${SEAT_INDEX}-s.tls: "true"

