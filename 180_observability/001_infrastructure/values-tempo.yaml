---
storage:
  trace:
    backend: s3
    s3:
      access_key: "minioadmin"
      secret_key: "minioadmin"
      bucket: "tempo"
      endpoint: "http://minio.minio:9000"
      insecure: true

minio:
  enabled: false

traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  zipkin:
    enabled: false
  jaeger:
    thriftHttp:
      enabled: false